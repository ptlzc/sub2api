name: Build and push image to Aliyun ACR

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'Dockerfile'
      - '.github/workflows/aliyun-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: sub2api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Derive image tags
        id: tags
        run: |
          SHORT_SHA=$(git rev-parse --short=12 HEAD)
          FULL_SHA=$(git rev-parse HEAD)
          IMAGE="${{ secrets.REGISTRY_URL }}/${{ secrets.REGISTRY_NAMESPACE }}/${{ env.IMAGE_NAME }}"
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "sha_tag=sha-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "full_sha=${FULL_SHA}" >> $GITHUB_OUTPUT

      - name: Build and push (sha tag)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.sha_tag }}
          build-args: |
            GOPROXY=https://goproxy.cn,direct
            GOSUMDB=sum.golang.google.cn
            VERSION=${{ steps.tags.outputs.sha_tag }}
            COMMIT=${{ steps.tags.outputs.full_sha }}
          platforms: linux/amd64
          cache-from: type=registry,ref=${{ steps.tags.outputs.image }}:buildcache
          cache-to: type=registry,ref=${{ steps.tags.outputs.image }}:buildcache,mode=max

      - name: Output image reference
        run: |
          echo "Built and pushed: ${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.sha_tag }}"
          echo "Source commit: ${{ steps.tags.outputs.full_sha }}"
